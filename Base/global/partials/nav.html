<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>
  nav {
    background-color: black
  }

  .line-1 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }

  .line-1 .home {
    font-size: 22px;
    transition: 0.2s;
    color: white;
    margin-left: 40px;
    font-weight: bold;
    padding-top: 15px;
  }

  .line-1 a {
    color: white;
    transition: transform 0.2s;
    margin-top: 15px;
    text-decoration: none;
    cursor: pointer;
  }

  .line-1 .home a:hover {
    color: rgb(160, 32, 240);
  }

  .line-1 .input {
    display: flex;
    justify-content: center;
  }

  .line-1 input {
    background-color: rgba(85, 85, 85, 0.5);
    border: none;
    border-radius: 25px;
    margin-top: 23px;
    margin-bottom: 10px;
    font-size: 23px;
    padding: 0px 18px;
    width: 100%;
    font-weight: bold;
    caret-color: #ffffff;
    color: white;
  }

  .line-1 input::placeholder {
    color: #CCC;
    text-align: center;
  }

  .line-1 .contato {
    display: flex;
    align-items: center;
    justify-content: right;
    margin-right: 40px;
    font-weight: bold;
    gap: 15px;
  }

  .line-1 .contato a:hover {
    transform: scale(1.08);
  }

  .line-2 {
    width: 100%;
    padding: 10px 0;
    display: flex;
    justify-content: space-around;
  }

  .line-2 p {
    color: white;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
  }

  .line-2 p:hover {
    color: #f0f0f0b9;
  }

  .line-2 ul {
    display: flex;
    justify-content: center;
    align-items: center;
    list-style: none;
  }

  .line-2 ul li {
    margin: 0 15px;
  }

  .line-2 a {
    text-decoration: none;
    color: #f4f4f4;
    font-weight: bold;
    transition: 0.2s;
  }

  .line-2 a:hover {
    color: #f0f0f0b9;
  }

  .espaco-vazio {
    padding: 0 80px;
  }

  .scroller-fade {
    width: 100%;
    overflow: hidden;
    height: 30px;
    position: relative;
    background-color: #5d5d5d;
    box-shadow: 0 2px 5px rgba(72, 72, 72, 0.2);
    display: flex;
    align-items: center;
  }

  .conteudo-fade {
    position: absolute;
    white-space: nowrap;
    font-size: 20px;
    color: #fff;
    padding: 10px 20px;
    animation: deslizar-fade 10s linear infinite;
  }

  @keyframes deslizar-fade {
    0% {
      transform: translateX(300%);
      opacity: 0.5;
    }

    10% {
      opacity: 1;
    }

    90% {
      opacity: 1;
    }

    100% {
      transform: translateX(-100%);
      opacity: 0;
    }
  }
</style>

<div class="scroller-fade">
  <div class="conteudo-fade">No ato da primeira compra o frete será gratuito com direito a um brinde!</div>
</div>

<nav>
  <div class="line-1">
    <p class="home">
      <a href="#home">ANDROMEDA STUDIO</a>
    </p>
    <div class="input">
      <input type="text" name="" id="search" placeholder="Busque por um modelo...">
    </div>
    <div class="contato">
      <a href=""><span class="fab fa-whatsapp" aria-hidden="true"></span> CONTATO</a>
      <a href=""><span class="fa fa-question-circle"></span> AJUDA</a>
    </div>
  </div>
  <div class="line-2">
    <p class="categorias" id="categorias"><span class="fa fa-bars"></span> CATEGORIAS</p>
    <ul>
      <li><a href="">DESTAQUES</a></li>
      <li><a href="">FIGURES</a></li>
      <li><a href="">MASCARAS</a></li>
      <li><a href="">QUADROS</a></li>
      <li><a href="">SUPORTES</a></li>
      <li><a href="">PERSONALIZADOS</a></li>
    </ul>
    <span class="espaco-vazio"></span>
  </div>
</nav>
